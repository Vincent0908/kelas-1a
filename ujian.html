                    <h2 class="text-xl font-bold ${headerColor}">
                        ${day.hari}, ${day.tanggal}${todayBadge}

                            <p class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 mb-3">${u.waktu} WIB</p>

                        <thead>
                            <tr class="bg-gray-50 dark:bg-gray-700/40 text-left text-xs uppercase tracking-wide">
                                <th class="px-4 py-3 font-semibold text-gray-500 dark:text-gray-400 w-12">No.</th>
                                <th class="px-4 py-3 font-semibold text-gray-500 dark:text-gray-400">Nama</th>
                                <th class="px-4 py-3 font-semibold text-gray-500 dark:text-gray-400">NIM</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                            ${matched.map(s => {
                                const hl = q ? 'bg-yellow-50 dark:bg-yellow-900/10' : '';
                                return `
                                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition ${hl}">
                                        <td class="px-4 py-3 text-gray-400 font-mono text-xs">${s.no}</td>
                                        <td class="px-4 py-3 font-medium">${s.nama}</td>
                                        <td class="px-4 py-3 text-gray-500 dark:text-gray-400 font-mono text-xs">${s.nim}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            ruanganContainer.appendChild(card);
        });

        if (q && totalFound === 0) {
            ruanganContainer.innerHTML = `
                <div class="text-center py-16 bg-white dark:bg-gray-800 rounded-xl shadow-md">
                    <div class="text-5xl mb-3">🔍</div>
                    <p class="text-gray-600 dark:text-gray-300 font-medium">Tidak ditemukan hasil untuk "<strong>${query}</strong>"</p>
                    <p class="text-sm text-gray-400 mt-1">Pastikan nama atau NIM sudah benar.</p>
                </div>
            `;
        }
    }

    renderRuangan();
    searchInput.addEventListener('input', e => renderRuangan(e.target.value));

    </script>
</body>
</html>
