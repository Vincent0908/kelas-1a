                            <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-white text-indigo-600 shadow-sm dark:bg-gray-800 dark:text-indigo-300">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 7V3M16 7V3M4 11h16M6 5h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"/>
                                </svg>
                            </div>
                            <div>
                                <p class="text-xs font-semibold text-gray-500 dark:text-gray-400">Jadwal ${label}</p>
                                <h2 class="text-xl font-bold ${headerColor}">${day.hari}, ${day.tanggal}</h2>
                                <p class="text-sm text-gray-500 dark:text-gray-400">${day.ujian.length} mata kuliah</p>
                            </div>
                        </div>
                        <span class="inline-flex w-fit items-center rounded-full px-3 py-1 text-xs font-bold ${statusClass}">
                            ${statusLabel}
                        </span>
                    </div>
                </div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    ${day.ujian.map(u => `
                        <div class="p-4 md:p-5">
                            <div class="flex flex-col gap-4 md:flex-row md:items-start">
                                <div class="w-full rounded-lg bg-gray-50 p-3 ring-1 ring-gray-200 dark:bg-gray-700/50 dark:ring-gray-600 md:w-36 md:flex-shrink-0">
                                    <p class="text-xs font-semibold uppercase text-gray-400 dark:text-gray-500">Waktu Ujian</p>
                                    <div class="mt-2 grid grid-cols-2 gap-2 md:grid-cols-1">
                                        ${(() => {
                                            const [mulai, selesai] = u.waktu.split(/\s*[–-]\s*/);
                                            return `
                                                <div>
                                                    <p class="text-xs text-gray-400 dark:text-gray-500">Mulai</p>
                                                    <p class="text-base font-black leading-tight text-gray-900 dark:text-gray-100">${mulai}</p>
                                                </div>
                                                <div>
                                                    <p class="text-xs text-gray-400 dark:text-gray-500">Selesai</p>
                                                    <p class="text-base font-black leading-tight text-gray-900 dark:text-gray-100">${selesai || '-'}</p>
                                                </div>
                                            `;
                                        })()}
                                    </div>
                                    <p class="mt-2 text-xs font-semibold text-indigo-600 dark:text-indigo-300">WIB</p>
                                </div>
                                <div class="min-w-0 flex-1">
                                    <p class="text-base md:text-lg font-bold text-gray-900 dark:text-gray-100">${u.mataKuliah}</p>
                                    <div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        ${u.ruangan.map(r => `
                                            <div class="rounded-lg border border-gray-200 bg-gray-50 p-3 dark:border-gray-600 dark:bg-gray-700/50">
                                                <div class="flex items-start justify-between gap-3">
                                                    <div>
                                                        <p class="text-xs font-semibold text-gray-400 dark:text-gray-500">${r.label}</p>
                                                        <p class="mt-1 text-2xl font-black leading-none text-indigo-700 dark:text-indigo-300">Ruang ${r.ruang}</p>
                                                    </div>
                                                    <span class="rounded-full bg-white px-2 py-1 text-xs font-bold text-indigo-700 ring-1 ring-indigo-100 dark:bg-gray-800 dark:text-indigo-200 dark:ring-gray-600">${r.ruang}</span>
                                                </div>
                                                <p class="mt-3 text-xs leading-5 text-gray-500 dark:text-gray-400">Pengawas: ${r.pengawas}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            container.appendChild(card);
        });
    }

    // Render UAS dan UTS — cukup ubah data di array atas, tidak perlu menyentuh baris ini
    renderJadwal('uas-container', jadwalUAS, 'UAS');
    renderJadwal('uts-container', jadwalUTS, 'UTS');


    // ================================================================
    // PEMBAGIAN RUANGAN — render + search
    // ================================================================
    const ruanganContainer = document.getElementById('ruangan-container');
    const searchInput      = document.getElementById('search-input');
    const searchWrapper    = document.getElementById('search-wrapper');
    const pembagianRuanganData = typeof pembagianRuangan === 'undefined' ? [] : pembagianRuangan;

    function renderEmptyRuangan() {
        searchWrapper.classList.add('hidden');
        ruanganContainer.innerHTML = `
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden border border-gray-200 dark:border-gray-700">
                <div class="p-6 md:p-8 text-center">
                    <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-50 text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-300">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-3M9 9h.01M9 13h.01M9 17h.01M13 17h.01M17 17h.01"/>
                        </svg>
                    </div>
                    <span class="inline-flex items-center rounded-full bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-200 dark:bg-amber-400/10 dark:text-amber-200 dark:ring-amber-300/20">
                        Belum diumumkan
                    </span>
                    <h2 class="mt-4 text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-100">Pembagian ruangan belum diumumkan.</h2>
                    <p class="mx-auto mt-2 max-w-md text-sm leading-6 text-gray-500 dark:text-gray-400">
                        Daftar peserta dan ruangan akan ditampilkan di sini setelah memasuki masa UTS atau UAS dan informasi resmi sudah tersedia.
                    </p>
                    <div class="mt-6 rounded-lg bg-gray-50 px-4 py-3 text-sm text-gray-500 dark:bg-gray-700/40 dark:text-gray-300">
                        Data akan muncul jika sudah ada data terbaru. Terima Kasih.
                    </div>
                </div>
            </div>
        `;
    }

    function escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[char]));
    }

    function getInitials(name) {
        return name
            .trim()
            .split(/\s+/)
            .slice(0, 2)
            .map(word => word[0])
            .join('');
    }

    function renderRuangan(query = '') {
        if (!Array.isArray(pembagianRuanganData) || pembagianRuanganData.length === 0) {
            renderEmptyRuangan();
            return;
        }

        searchWrapper.classList.remove('hidden');
        const q = query.toLowerCase().trim();
        const totalStudents = pembagianRuanganData.reduce((total, group) => total + group.siswa.length, 0);
        const filteredGroups = pembagianRuanganData
            .map(group => {
                const matched = q
                    ? group.siswa.filter(s => s.nama.toLowerCase().includes(q) || s.nim.includes(q))
                    : group.siswa;
                return { ...group, matched };
            })
            .filter(group => !q || group.matched.length > 0);
        const totalFound = filteredGroups.reduce((total, group) => total + group.matched.length, 0);

        if (q && totalFound === 0) {
            ruanganContainer.innerHTML = `
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden border border-gray-200 dark:border-gray-700">
                    <div class="p-6 md:p-8 text-center">
                        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-50 text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-300">
                            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0z"/>
                            </svg>
                        </div>
                        <span class="inline-flex items-center rounded-full bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-200 dark:bg-amber-400/10 dark:text-amber-200 dark:ring-amber-300/20">
                            Tidak ditemukan
                        </span>
                        <h2 class="mt-4 text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-100">Tidak ada hasil untuk "${escapeHTML(query)}".</h2>
                        <p class="mx-auto mt-2 max-w-md text-sm leading-6 text-gray-500 dark:text-gray-400">
                            Pastikan nama atau NIM yang dicari sudah benar.
                        </p>
                    </div>
                </div>
            `;
            return;
        }

        ruanganContainer.innerHTML = `
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
                    <p class="text-xs font-semibold uppercase text-gray-400 dark:text-gray-500">${q ? 'Hasil Pencarian' : 'Total Peserta'}</p>
                    <p class="mt-1 text-2xl font-black text-indigo-600 dark:text-indigo-300">${q ? totalFound : totalStudents}</p>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
                    <p class="text-xs font-semibold uppercase text-gray-400 dark:text-gray-500">Ruangan Aktif</p>
                    <p class="mt-1 text-2xl font-black text-indigo-600 dark:text-indigo-300">${filteredGroups.length}</p>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
                    <p class="text-xs font-semibold uppercase text-gray-400 dark:text-gray-500">Kelas</p>
                    <p class="mt-1 text-2xl font-black text-indigo-600 dark:text-indigo-300">TRPL-3A</p>
                </div>
            </div>
        `;

        filteredGroups.forEach(group => {
            const card = document.createElement('div');
            card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden border border-gray-200 dark:border-gray-700';

            card.innerHTML = `
                <div class="bg-indigo-50/80 dark:bg-gray-700/70 p-4 border-b border-gray-200 dark:border-gray-600 flex items-center justify-between gap-3">
                    <div class="flex items-center gap-3">
                        <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-white text-indigo-600 shadow-sm dark:bg-gray-800 dark:text-indigo-300">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-3M9 9h.01M9 13h.01M9 17h.01M13 17h.01M17 17h.01"/>
                            </svg>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-indigo-700 dark:text-indigo-300">${group.label}</h2>
                            <p class="text-sm text-gray-500 dark:text-gray-400">
                                ${q ? `${group.matched.length} dari ${group.siswa.length}` : group.siswa.length} mahasiswa TRPL-3A
                            </p>
                        </div>
                    </div>
                    <span class="rounded-full bg-white px-3 py-1 text-sm font-black text-indigo-700 ring-1 ring-indigo-100 dark:bg-gray-800 dark:text-indigo-200 dark:ring-gray-600">${group.ruang}</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="bg-gray-50 dark:bg-gray-700/40 text-left text-xs uppercase">
                                <th class="px-4 py-3 font-semibold text-gray-500 dark:text-gray-400 w-16">No.</th>
                                <th class="px-4 py-3 font-semibold text-gray-500 dark:text-gray-400">Mahasiswa</th>
                                <th class="px-4 py-3 font-semibold text-gray-500 dark:text-gray-400">NIM</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                            ${group.matched.map(s => {
                                const hl = q ? 'bg-indigo-50/50 dark:bg-indigo-500/5' : '';
                                return `
                                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition ${hl}">
                                        <td class="px-4 py-3 text-gray-400 font-mono text-xs">${s.no}</td>
                                        <td class="px-4 py-3">
                                            <div class="flex items-center gap-3">
                                                <div class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-full bg-indigo-50 text-xs font-black text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-200">
                                                    ${getInitials(s.nama)}
                                                </div>
                                                <span class="font-semibold text-gray-800 dark:text-gray-100">${s.nama}</span>
                                            </div>
                                        </td>
                                        <td class="px-4 py-3 text-gray-500 dark:text-gray-400 font-mono text-xs">${s.nim}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            ruanganContainer.appendChild(card);
        });
    }

    renderRuangan();
    searchInput.addEventListener('input', e => renderRuangan(e.target.value));

    </script>
</body>
</html>
