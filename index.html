<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm flex-shrink-0">3A</div>
                    <div>
                        <p class="font-bold text-indigo-700 dark:text-indigo-400 text-sm leading-none">TRPL-3A</p>
                        <p class="text-xs text-gray-500 leading-none mt-0.5">Semester Ganjil 2026/2027</p>
                    </div>
                </div>

                <!-- Desktop Nav Links -->
                <div class="hidden md:flex items-center gap-1">
                    <a href="#jadwal-kuliah" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                        Jadwal Kuliah
                    </a>
                    <a href="ujian.html#jadwal-ujian" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                        Jadwal Ujian
                    </a>
                    <a href="ujian.html#pembagian-ruangan" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                        Pembagian Ruangan

                <!-- Hamburger Button (mobile) -->
                <button id="hamburger-btn" class="md:hidden p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" aria-label="Toggle menu">
                    <svg id="icon-open" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                    <svg id="icon-close" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
            <div class="max-w-4xl mx-auto px-4 py-2 space-y-1">
                <a href="#jadwal-kuliah" class="mobile-link block px-4 py-3 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-indigo-50 dark:hover:bg-gray-700 hover:text-indigo-600 transition-colors">
                    📅 Jadwal Kuliah
                </a>
                <a href="ujian.html#jadwal-ujian" class="mobile-link block px-4 py-3 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-indigo-50 dark:hover:bg-gray-700 hover:text-indigo-600 transition-colors">
                    📝 Jadwal Ujian
                </a>
                <a href="ujian.html#pembagian-ruangan" class="mobile-link block px-4 py-3 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-indigo-50 dark:hover:bg-gray-700 hover:text-indigo-600 transition-colors">
                    🏫 Pembagian Ruangan
                </a>
            </div>
        </div>
    </nav>

    <!-- ====== MAIN CONTENT ====== -->
    <div class="pt-16">

        <!-- ===== SECTION: JADWAL KULIAH ===== -->
        <section id="jadwal-kuliah">
            <div class="container mx-auto p-4 md:p-8 max-w-4xl">
                <header class="text-center mb-8 pt-2">
                    <h1 class="text-3xl md:text-4xl font-bold text-indigo-600 dark:text-indigo-400">Jadwal Kuliah</h1>
                    <p class="text-lg text-gray-600 dark:text-gray-400 mt-2">Kelas TRPL-3A · TA. 2026/2027</p>
                </header>
                <main id="schedule-container" class="space-y-6"></main>
            </div>
        </section>

        <footer class="text-center py-8 text-sm text-gray-400 border-t border-gray-200 dark:border-gray-700">
            <p>Portal Kelas TRPL-3A · Politeknik Negeri Medan</p>
        </footer>
    </div>


    <script>
    // ================================================================
    // DATA — Dosen & Jadwal Kuliah
    // ================================================================

    const dosen = {
        'WND': 'Winda Syafitri',
        'APR': 'Aprilza Aswani',
        'ISN': 'Isni Khairina',
        'AHY': 'Achmad Yani',
        'DTK': 'Dita Kartika',
        'YUN': 'Yuyun Yusnida Lase',
        'SRF': 'Sharfina Faza',
        'LAM': 'Lamtiur Sinambela'
    };

    // Kosongkan isi array [] atau komentari data di dalamnya untuk menampilkan pesan belum update.
    const jadwal = [
        // { hari: 'Senin',  waktuMulai: '13:05', waktuSelesai: '14:45', mataKuliah: 'Alajabar Linear',                          kodeDosen: 'LAM', ruang: 'N-205' },
        // { hari: 'Senin',  waktuMulai: '14:45', waktuSelesai: '18:20', mataKuliah: 'Bahasa Inggris Conversation II',            kodeDosen: 'WND', ruang: 'N-205' },
        // { hari: 'Selasa', waktuMulai: '13:05', waktuSelesai: '14:45', mataKuliah: 'Struktur Data',                            kodeDosen: 'AHY', ruang: 'N-205' },
        // { hari: 'Selasa', waktuMulai: '14:45', waktuSelesai: '18:20', mataKuliah: 'Praktik Struktur Data',                    kodeDosen: 'AHY', ruang: 'N-205' },
        // { hari: 'Rabu',   waktuMulai: '13:05', waktuSelesai: '14:45', mataKuliah: 'Etika & Budaya Sumatera Utara',            kodeDosen: 'APR', ruang: 'N-205' },
        // { hari: 'Rabu',   waktuMulai: '14:45', waktuSelesai: '16:25', mataKuliah: 'Bahasa Indonesia',                         kodeDosen: 'ISN', ruang: 'N-205' },
        // { hari: 'Rabu',   waktuMulai: '16:40', waktuSelesai: '18:20', mataKuliah: 'Pemrograman Berorientasi Objek 1',         kodeDosen: 'YUN', ruang: 'N-205' },
        // { hari: 'Kamis',  waktuMulai: '13:05', waktuSelesai: '16:25', mataKuliah: 'Praktik Pemrograman Berorientasi Objek 1', kodeDosen: 'YUN', ruang: 'N-205' },
        // { hari: 'Kamis',  waktuMulai: '16:40', waktuSelesai: '18:20', mataKuliah: 'Pancasila',                                kodeDosen: 'DTK', ruang: 'N-205' },
        // { hari: 'Jumat',  waktuMulai: '13:50', waktuSelesai: '18:15', mataKuliah: 'Design Web',                               kodeDosen: 'SRF', ruang: 'N-205' },
    ];


    // ================================================================
    // NAVBAR — Hamburger toggle
    // ================================================================
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const mobileMenu   = document.getElementById('mobile-menu');
    const iconOpen     = document.getElementById('icon-open');
    const iconClose    = document.getElementById('icon-close');

    hamburgerBtn.addEventListener('click', () => {
        const isHidden = mobileMenu.classList.toggle('hidden');
        iconOpen.classList.toggle('hidden', !isHidden);
        iconClose.classList.toggle('hidden', isHidden);
    });

    document.querySelectorAll('.mobile-link').forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
            iconOpen.classList.remove('hidden');
            iconClose.classList.add('hidden');
        });
    });


    // ================================================================
    // JADWAL KULIAH — render
    // ================================================================
    function createCalendarLink(event) {
        const semEnd = new Date();
        semEnd.setMonth(semEnd.getMonth() + 4);
        const until = semEnd.toISOString().split('T')[0].replace(/-/g, '');

        const dayMap = { Minggu:0, Senin:1, Selasa:2, Rabu:3, Kamis:4, Jumat:5, Sabtu:6 };
        const target = dayMap[event.hari];
        const first  = new Date();
        first.setDate(first.getDate() + (target + 7 - first.getDay()) % 7);

        const [sh, sm] = event.waktuMulai.split(':');
        const [eh, em] = event.waktuSelesai.split(':');
        const toUTC = (h, m) => {
            const d = new Date(first.getFullYear(), first.getMonth(), first.getDate(), h, m);
            return new Date(d - 7*3600000).toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
        };

        const params = new URLSearchParams({
            text: event.mataKuliah,
            dates: `${toUTC(sh,sm)}/${toUTC(eh,em)}`,
            details: `Dosen: ${dosen[event.kodeDosen]}\nRuang: ${event.ruang}`,
            location: `Ruang ${event.ruang}, POLMED`,
            recur: `RRULE:FREQ=WEEKLY;UNTIL=${until}T170000Z`
        });
        return `https://www.google.com/calendar/render?action=TEMPLATE&${params}`;
    }

    const schedContainer = document.getElementById('schedule-container');
    const jadwalKuliahData = typeof jadwal === 'undefined' ? [] : jadwal;

    function renderEmptySchedule() {
        schedContainer.innerHTML = `
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden border border-gray-200 dark:border-gray-700">
                <div class="p-6 md:p-8 text-center">
                    <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-50 text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-300">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
                        </svg>
                    </div>
                    <span class="inline-flex items-center rounded-full bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700 ring-1 ring-amber-200 dark:bg-amber-400/10 dark:text-amber-200 dark:ring-amber-300/20">
                        Belum di update
                    </span>
                    <h2 class="mt-4 text-xl md:text-2xl font-bold text-gray-800 dark:text-gray-100">Mata kuliah belum di update.</h2>
                    <p class="mx-auto mt-2 max-w-md text-sm leading-6 text-gray-500 dark:text-gray-400">
                        Jadwal perkuliahan akan ditampilkan di sini setelah data terbaru tersedia.
                    </p>
                    <div class="mt-6 rounded-lg bg-gray-50 px-4 py-3 text-sm text-gray-500 dark:bg-gray-700/40 dark:text-gray-300">
                        Data akan muncul jika sudah ada data terbaru. Terima Kasih.
                    </div>
                </div>
            </div>
        `;
    }

    function renderSchedule() {
        if (!Array.isArray(jadwalKuliahData) || jadwalKuliahData.length === 0) {
            renderEmptySchedule();
            return;
        }

        const grouped = jadwalKuliahData.reduce((acc, cur) => {
            (acc[cur.hari] = acc[cur.hari] || []).push(cur); return acc;
        }, {});
        const dayOrder = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
        Object.keys(grouped)
            .sort((a,b) => dayOrder.indexOf(a) - dayOrder.indexOf(b))
            .forEach(hari => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden';
                card.innerHTML = `
                    <div class="bg-indigo-50 dark:bg-gray-700 p-4 border-b border-gray-200 dark:border-gray-600">
                        <h2 class="text-xl font-bold text-indigo-700 dark:text-indigo-300">${hari}</h2>
                    </div>
                    <ul class="divide-y divide-gray-200 dark:divide-gray-700">
                        ${grouped[hari].map(item => `
                            <li class="p-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                                <div class="flex-grow">
                                    <p class="font-bold text-lg">${item.mataKuliah}</p>
                                    <p class="text-sm text-gray-600 dark:text-gray-400">
                                        <span class="font-semibold">${item.waktuMulai} – ${item.waktuSelesai}</span>
                                        &nbsp;·&nbsp;${dosen[item.kodeDosen]}&nbsp;·&nbsp;Ruang ${item.ruang}
                                    </p>
                                </div>
                                <a href="${createCalendarLink(item)}" target="_blank" rel="noopener noreferrer"
                                   class="w-full md:w-auto flex-shrink-0 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white text-sm font-bold py-2 px-4 rounded-lg transition text-center">
                                    + Google Calendar
                                </a>
                            </li>
                        `).join('')}
                    </ul>
                `;
                schedContainer.appendChild(card);
            });
    }

    renderSchedule();

    </script>
</body>
</html>
